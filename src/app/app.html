<div class="container">
  
  <header class="profile-header">
    <div class="avatar">
      <i class="fa-solid fa-shop"></i>
    </div>
    <h1 class="store-name">{{ storeName }}</h1>
    <p class="store-bio">{{ storeBio }}</p>
  </header>

  <section class="links-section">
    
    @for (link of links; track link.title) {
      <a [href]="link.url" target="_blank" class="btn" [ngClass]="link.class">
        <i [class]="link.icon"></i>
        <span>{{ link.title }}</span>
      </a>
    }

  </section>

  <!-- NUEVA SECCIÓN: FEED DE PRODUCTOS -->
  <section class="products-feed">
    <h2 class="feed-title"><i class="fa-solid fa-border-all"></i> Productos Destacados</h2>
    
    <div class="products-grid">
      @for (product of products; track product.title) {
        <div class="product-card">
          <img [src]="product.imageUrl" [alt]="product.title" class="product-img">
          <div class="product-overlay">
            <span class="product-price">{{ product.price }}</span>
          </div>
        </div>
      }
    </div>
  </section>

  <!-- FOOTER COMPACTO -->

  <footer class="main-footer">
    <p>Creado con ❤️ para potenciar emprendedores</p>
  </footer>

</div>
